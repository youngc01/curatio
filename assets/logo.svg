<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#a855f7" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="url(#accent)" stroke-width="3"/>

  <!-- Film frame outer -->
  <rect x="108" y="128" width="296" height="256" rx="16" ry="16" fill="none" stroke="#333" stroke-width="4"/>

  <!-- Film sprocket holes left -->
  <rect x="116" y="148" width="16" height="12" rx="3" fill="#333"/>
  <rect x="116" y="176" width="16" height="12" rx="3" fill="#333"/>
  <rect x="116" y="204" width="16" height="12" rx="3" fill="#333"/>
  <rect x="116" y="232" width="16" height="12" rx="3" fill="#333"/>
  <rect x="116" y="260" width="16" height="12" rx="3" fill="#333"/>
  <rect x="116" y="288" width="16" height="12" rx="3" fill="#333"/>
  <rect x="116" y="316" width="16" height="12" rx="3" fill="#333"/>
  <rect x="116" y="344" width="16" height="12" rx="3" fill="#333"/>

  <!-- Film sprocket holes right -->
  <rect x="380" y="148" width="16" height="12" rx="3" fill="#333"/>
  <rect x="380" y="176" width="16" height="12" rx="3" fill="#333"/>
  <rect x="380" y="204" width="16" height="12" rx="3" fill="#333"/>
  <rect x="380" y="232" width="16" height="12" rx="3" fill="#333"/>
  <rect x="380" y="260" width="16" height="12" rx="3" fill="#333"/>
  <rect x="380" y="288" width="16" height="12" rx="3" fill="#333"/>
  <rect x="380" y="316" width="16" height="12" rx="3" fill="#333"/>
  <rect x="380" y="344" width="16" height="12" rx="3" fill="#333"/>

  <!-- Inner frame (screen area) -->
  <rect x="142" y="140" width="228" height="232" rx="8" ry="8" fill="#111118"/>

  <!-- Stylized "C" letterform with AI sparkle -->
  <path d="M 310 210
           A 62 62 0 1 0 310 302"
        fill="none" stroke="url(#glow)" stroke-width="14" stroke-linecap="round" filter="url(#shadow)"/>

  <!-- AI sparkle - 4-point star top right -->
  <path d="M 340 190 L 344 172 L 348 190 L 366 194 L 348 198 L 344 216 L 340 198 L 322 194 Z"
        fill="#c084fc" opacity="0.9"/>

  <!-- Small sparkle -->
  <path d="M 310 170 L 312 162 L 314 170 L 322 172 L 314 174 L 312 182 L 310 174 L 302 172 Z"
        fill="#a855f7" opacity="0.7"/>

  <!-- Tiny sparkle -->
  <path d="M 360 220 L 361 215 L 362 220 L 367 221 L 362 222 L 361 227 L 360 222 L 355 221 Z"
        fill="#e9d5ff" opacity="0.6"/>

  <!-- Neural dots connected by lines (AI motif) -->
  <circle cx="190" cy="200" r="4" fill="#7c3aed" opacity="0.5"/>
  <circle cx="210" cy="180" r="3" fill="#a855f7" opacity="0.4"/>
  <circle cx="180" cy="230" r="3" fill="#a855f7" opacity="0.4"/>
  <circle cx="205" cy="250" r="4" fill="#7c3aed" opacity="0.5"/>
  <circle cx="185" cy="270" r="3" fill="#a855f7" opacity="0.3"/>
  <circle cx="215" cy="310" r="3" fill="#a855f7" opacity="0.3"/>
  <circle cx="195" cy="300" r="4" fill="#7c3aed" opacity="0.4"/>

  <line x1="190" y1="200" x2="210" y2="180" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="190" y1="200" x2="180" y2="230" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="180" y1="230" x2="205" y2="250" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="205" y1="250" x2="185" y2="270" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="185" y1="270" x2="195" y2="300" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="195" y1="300" x2="215" y2="310" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <line x1="190" y1="200" x2="205" y2="250" stroke="#7c3aed" stroke-width="1" opacity="0.2"/>

  <!-- "CURATIO" text below frame -->
  <text x="256" y="420" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="8" fill="url(#glow)">CURATIO</text>
  <text x="256" y="445" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="400" letter-spacing="4" fill="#666">AI-CURATED CINEMA</text>
</svg>
