version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: curatio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stremio_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: curatio-app
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/stremio_ai
      - DAILY_UPDATE_ENABLED=${DAILY_UPDATE_ENABLED:-false}
      - DAILY_UPDATE_TIME=${DAILY_UPDATE_TIME:-03:00}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./workers:/app/workers
    restart: unless-stopped

  worker:
    build: .
    container_name: curatio-worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:5432/stremio_ai
    volumes:
      - ./app:/app/app
      - ./workers:/app/workers
    command: "tail -f /dev/null"  # Keep container running for manual worker execution
    profiles:
      - workers  # Only start when explicitly requested

volumes:
  postgres_data:

networks:
  default:
    name: curatio-network
